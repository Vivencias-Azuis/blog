version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - npm ci --include=dev --cache .npm --prefer-offline
        - rm -f .env.production
        - |
          cat <<EOF > .env.production
          NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
          STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
          STRIPE_PRICE_ID_APOIAR=$STRIPE_PRICE_ID_APOIAR
          STRIPE_PRICE_ID_FORTALECER=$STRIPE_PRICE_ID_FORTALECER
          STRIPE_PRICE_ID_SUSTENTAR=$STRIPE_PRICE_ID_SUSTENTAR
          DATABASE_URL=$DATABASE_URL
          TURSO_AUTH_TOKEN=$TURSO_AUTH_TOKEN
          PIX_PROVIDER=$PIX_PROVIDER
          MERCADO_PAGO_ACCESS_TOKEN=$MERCADO_PAGO_ACCESS_TOKEN
          ABACATE_PAY_API_KEY=$ABACATE_PAY_API_KEY
          FORMSPREE_EBOOK_ENDPOINT=$FORMSPREE_EBOOK_ENDPOINT
          FORMSPREE_NEWSLETTER_ENDPOINT=$FORMSPREE_NEWSLETTER_ENDPOINT
          NEXT_PUBLIC_GA4_MEASUREMENT_ID=$NEXT_PUBLIC_GA4_MEASUREMENT_ID
          EOF
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - .next/cache/**/*
      - node_modules/**/*
